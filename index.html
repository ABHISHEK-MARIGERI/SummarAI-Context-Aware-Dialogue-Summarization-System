<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #FFF7ED;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #FB923C;
        }

        h3 {
            text-align: center;
            margin-top: -10px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            background: #FB923C;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #summary-output {
            margin-top: 20px;
            background: #FFEDD5;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Text Summarizer</h1>
    <h3>using HuggingFace Transformer</h3>

    <form id="summarization-form">
        <textarea id="dialogue-input" placeholder="Enter your content..."></textarea>
        <button type="submit">Summarize</button>
    </form>

    <div id="summary-output">
        <h3>Content Summary</h3>
        <p id="summary-text"></p>
    </div>
</div>

<script>
document.getElementById("summarization-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = document.getElementById("dialogue-input").value.trim();
    const output = document.getElementById("summary-text");

    if (!text) return;

    output.innerText = "Processing...";

    try {
        const response = await fetch("http://127.0.0.1:8000/summarize/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ dialogue: text })
        });

        const data = await response.json();
        output.innerText = data.summary;

    } catch (err) {
        output.innerText = "Error connecting to server";
    }
});
</script>
</body>
</html>
